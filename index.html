<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的导航</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: color 2s ease;
    overflow-x: hidden;
    background: #1a1a2e;
  }

  /* ===== Blurred Background Layers ===== */
  .bg-layer {
    position: fixed;
    inset: -20px;          /* 扩展避免模糊边缘白边 */
    z-index: -1;
    background-size: cover;
    background-position: center;
    filter: blur(5px) brightness(0.85);
    transition: opacity 2s ease;
  }
  .bg-layer::after {
    content: '';
    position: absolute;
    inset: 0;
    background: inherit;
    background-size: cover;
    background-position: center;
  }

  /* ===== Content Wrapper ===== */
  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1100px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  /* ===== Header ===== */
  header {
    text-align: center;
    padding: 60px 0 40px;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    transition: color 2s ease;
  }
  header .subtitle {
    font-size: 0.9rem;
    opacity: 0.6;
    font-weight: 400;
    transition: color 2s ease;
  }

  /* ===== Section ===== */
  section { margin-bottom: 48px; }
  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 16px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 2s ease;
  }
  .section-title .dot {
    width: 4px;
    height: 18px;
    border-radius: 2px;
    transition: background 2s ease;
  }

  /* ===== Card Grid ===== */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media (min-width: 640px)  { .card-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 900px)  { .card-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 1100px) { .card-grid { grid-template-columns: repeat(5, 1fr); } }

  /* ===== Glass Card ===== */
  .card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 2s ease, border-color 2s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.18);
    background: var(--card-hover-bg, rgba(255,255,255,0.14));
  }
  .card:active {
    transform: scale(0.98);
    transition: transform 0.1s ease;
  }

  .card-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
    transition: transform 0.25s ease;
  }
  .card:hover .card-icon { transform: scale(1.1); }
  .card-icon img {
    width: 28px; height: 28px;
    object-fit: contain;
    border-radius: 4px;
  }

  .card-text { min-width: 0; }
  .card-name {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 2s ease;
  }
  .card-desc {
    font-size: 0.78rem;
    line-height: 1.3;
    opacity: 0.65;
    margin-top: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: color 2s ease;
  }

  /* ===== Footer ===== */
  footer {
    text-align: center;
    padding: 40px 0 32px;
    font-size: 0.8rem;
    opacity: 0.45;
    margin-top: auto;
    transition: color 2s ease;
  }

  /* ===== Debug bar ===== */
  .debug-bar {
    position: fixed;
    bottom: 12px;
    right: 12px;
    z-index: 100;
    display: flex;
    gap: 6px;
    opacity: 1;
  }
  .debug-bar button {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4);
    color: #fff;
    font-size: 0.7rem;
    cursor: pointer;
    backdrop-filter: blur(8px);
  }
  .debug-bar button:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>

<div id="bg1" class="bg-layer" style="opacity:1; z-index:-1;"></div>
<div id="bg2" class="bg-layer" style="opacity:0; z-index:-2;"></div>

<div class="wrapper">
  <header>
    <h1 id="page-title">我的导航</h1>
    <p class="subtitle" id="page-subtitle">常用网站直达</p>
  </header>

  <main id="content"></main>

  <footer><span>Made with ♥</span></footer>
</div>

<div class="debug-bar">
  <button onclick="setDebugHour(6)">🌅 6:00</button>
  <button onclick="setDebugHour(10)">☀️ 10:00</button>
  <button onclick="setDebugHour(14)">🌤 14:00</button>
  <button onclick="setDebugHour(18)">🌇 18:00</button>
  <button onclick="setDebugHour(22)">🌙 22:00</button>
  <button onclick="setDebugHour(2)">✨ 2:00</button>
  <button onclick="setDebugHour(null)">⏰ 实时</button>
</div>

<script>
// ============================================================
//  🔗 链接数据
// ============================================================

      { name: "第二课时",   url: "https://itongjis.tongji.edu.cn/",    icon: "🎡", desc: "劳动学时活动发布" },

      { name: "知网",       url: "https://www.cnki.net",               icon: "📰", desc: "中文学术论文" },
      { name: "哲社科",     url: "http://www.ncpssd.org/",             icon: "🏛️", desc: "哲学社会科学数据库" },
      { name: "四六级真题", url: "https://pastpapers.cn/contents",     icon: "📄", desc: "四六级历年真题" },
      { name: "Jupyter",    url: "https://jupyter.org/try-jupyter/lab/", icon: "🔬", desc: "在线 Jupyter Notebook" },
      { name: "6分钟英语",  url: "https://www.bbc.co.uk/learningenglish/english/features/6-minute-english", icon: "🎧", desc: "BBC 6 Minute English" },
      { name: "GitHub",     url: "https://github.com/search?q=%E5%90%8C%E6%B5%8E&type=repositories&p=8", icon: "💻", desc: "同济相关仓库" },
    ]
  },

      { name: "英语小说",   url: "https://yingyuxiaoshuo.com/",           icon: "📕", desc: "英语小说在线阅读" },
      { name: "秀米",       url: "https://xiumi.us/#/",                   icon: "📱", desc: "排版编辑器" },
      { name: "AI工具箱",   url: "https://ai-tab.cn/?from=claude",        icon: "🧰", desc: "AI 工具导航" },

    ]

  {

    links: [

      { name: "葡萄田",     url: "https://vallennox.com/",                        icon: "🍇", desc: "Vallennox 个人站" },
      { name: "新加坡早报", url: "https://www.zaobao.com/",                       icon: "📰", desc: "联合早报" },
      { name: "晋江",       url: "https://bbs.jjwxc.net/board.php?board=3",       icon: "💬", desc: "晋江文学城论坛" },
      { name: "古诗文",     url: "https://www.gushiwen.cn/",                      icon: "🏮", desc: "古诗文网" },
      { name: "Bilibili",   url: "https://www.bilibili.com/",                     icon: "📺", desc: "哔哩哔哩" },
      { name: "Dating",     url: "https://trycampusdate.com/tongji/dashboard",    icon: "💕", desc: "同济校园交友" },
      { name: "频遇",       url: "https://wavelength-ai.cn/app",                  icon: "🌊", desc: "Wavelength AI 社交" },
      { name: "Lofter",     url: "https://www.lofter.com/",                       icon: "🎭", desc: "LOFTER 轻博客" },
    ]
  },
];

// ============================================================
//  🖼️ 背景图时段映射
//     每张图有对应的时间段，过渡时自动淡入淡出
//     bgKey: 时段起点, img: 背景图文件名
// ============================================================
const BG_SLOTS = [
  { bgKey: 5,  img: 'bg/背景1.jpg' },  //  5:00 清晨
  { bgKey: 7,  img: 'bg/背景2.jpg' },  //  7:00 上午
  { bgKey: 10, img: 'bg/背景3.jpg' },  // 10:00 正午
  { bgKey: 14, img: 'bg/背景4.jpg' },  // 14:00 午后
  { bgKey: 17, img: 'bg/背景5.jpg' },  // 17:00 黄昏
  { bgKey: 20, img: 'bg/背景6.jpg' },  // 20:00 夜晚
  { bgKey: 24, img: 'bg/背景6.jpg' },  // 24:00 深夜(同夜晚)
];

// ============================================================
//  📦 图片预加载
// ============================================================
const preloaded = {};
BG_SLOTS.forEach(s => {
  if (!preloaded[s.img]) {
    const img = new Image();
    img.src = s.img;
    preloaded[s.img] = img;
  }
});

// ============================================================
//  🌅 背景切换 & 主题颜色
// ============================================================
const bg1 = document.getElementById('bg1');
const bg2 = document.getElementById('bg2');
let activeLayer = 1;       // 1 或 2，当前显示的层
let currentImg = null;
let debugHour = null;

function setDebugHour(h) {
  debugHour = h;
  updateBackground();
}

function getSimulatedNow() {
  if (debugHour !== null) {
    const d = new Date();
    d.setHours(Math.floor(debugHour), (debugHour % 1) * 60, 0, 0);
    return d;
  }
  return new Date();
}

// 根据时间判断是否为夜间模式
function isNightTime(now) {
  const h = now.getHours() + now.getMinutes() / 60;
  return h >= 20 || h < 5;
}

// 获取当前时段应该显示的图片
function getImageForTime(now) {
  const h = now.getHours() + now.getMinutes() / 60;
  let idx = BG_SLOTS.length - 2; // 默认倒数第二张
  for (let i = 0; i < BG_SLOTS.length - 1; i++) {
    if (h < BG_SLOTS[i + 1].bgKey) { idx = i; break; }
  }
  return BG_SLOTS[idx].img;
}

function updateBackground() {
  const now = getSimulatedNow();
  const img = getImageForTime(now);
  const night = isNightTime(now);

  // 只在图片变化时切换
  if (img === currentImg) {
    // 仍然需要更新文字颜色（过渡期可能渐变）
    applyTheme(night);
    return;
  }
  currentImg = img;

  // 选择非活跃层设置新图片
  const nextLayer = activeLayer === 1 ? bg2 : bg1;
  const prevLayer = activeLayer === 1 ? bg1 : bg2;

  nextLayer.style.backgroundImage = `url('${img}')`;

  // 交叉淡入淡出
  nextLayer.style.opacity = '1';
  nextLayer.style.zIndex = '-1';
  prevLayer.style.opacity = '0';
  prevLayer.style.zIndex = '-2';

  activeLayer = activeLayer === 1 ? 2 : 1;
  applyTheme(night);
}

function applyTheme(night) {
  const textColor   = night ? 'rgba(255,255,255,0.9)' : 'rgba(30,30,50,0.9)';
  const textMuted   = night ? 'rgba(255,255,255,0.55)' : 'rgba(30,30,50,0.55)';
  const cardBg      = night ? 'rgba(255,255,255,0.07)' : 'rgba(255,255,255,0.55)';
  const cardBorder  = night ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.5)';
  const cardHoverBg = night ? 'rgba(255,255,255,0.13)' : 'rgba(255,255,255,0.75)';
  const dotColor    = night ? 'rgba(180,200,255,0.5)' : 'rgba(80,120,200,0.7)';

  document.getElementById('page-title').style.color = textColor;
  document.getElementById('page-subtitle').style.color = textMuted;
  document.querySelector('footer').style.color = textMuted;
  document.querySelectorAll('.section-title').forEach(el => el.style.color = textColor);
  document.querySelectorAll('.section-title .dot').forEach(el => el.style.background = dotColor);
  document.querySelectorAll('.card').forEach(el => {
    el.style.background = cardBg;
    el.style.borderColor = cardBorder;
    el.style.color = textColor;
  });
  document.querySelectorAll('.card-name').forEach(el => el.style.color = textColor);
  document.querySelectorAll('.card-desc').forEach(el => el.style.color = textMuted);
  document.documentElement.style.setProperty('--card-hover-bg', cardHoverBg);
}

// ============================================================
//  🏗️ 渲染卡片
// ============================================================
function renderCards() {
  const main = document.getElementById('content');
  main.innerHTML = '';

  for (const section of SITES) {
    const sec = document.createElement('section');
    sec.innerHTML = `
      <div class="section-title">
        <span class="dot"></span>${section.category}
      </div>
      <div class="card-grid">
        ${section.links.map(link => `
          <a class="card" href="${link.url}" target="_blank" rel="noopener" title="${link.desc || ''}">
            <div class="card-icon">
              ${link.icon.startsWith('http') || link.icon.endsWith('.png') || link.icon.endsWith('.svg') || link.icon.endsWith('.ico')
                ? `<img src="${link.icon}" alt="">`
                : link.icon}
            </div>
            <div class="card-text">
              <div class="card-name">${link.name}</div>
              ${link.desc ? `<div class="card-desc">${link.desc}</div>` : ''}
            </div>
          </a>
        `).join('')}
      </div>
    `;
    main.appendChild(sec);
  }

  // 初始背景：先设置第一层，避免白屏
  const now = getSimulatedNow();
  currentImg = getImageForTime(now);
  bg1.style.backgroundImage = `url('${currentImg}')`;
  updateBackground();
}

// ============================================================
//  🔁 定时刷新
// ============================================================
setInterval(updateBackground, 30000);

// 启动
renderCards();
</script>

</body>
</html>
