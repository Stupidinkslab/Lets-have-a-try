<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的导航</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: color 30s linear;
    overflow-x: hidden;
  }

  /* ===== Star Canvas ===== */
  #star-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    transition: opacity 60s linear;
  }

  /* ===== Content Wrapper ===== */
  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1100px;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  /* ===== Header ===== */
  header {
    text-align: center;
    padding: 60px 0 40px;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    transition: color 30s linear;
  }
  header .subtitle {
    font-size: 0.9rem;
    opacity: 0.6;
    font-weight: 400;
    transition: color 30s linear;
  }

  /* ===== Section ===== */
  section { margin-bottom: 48px; }
  .section-title {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 16px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 30s linear;
  }
  .section-title .dot {
    width: 4px;
    height: 18px;
    border-radius: 2px;
    transition: background 30s linear;
  }

  /* ===== Card Grid ===== */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media (min-width: 640px)  { .card-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 900px)  { .card-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 1100px) { .card-grid { grid-template-columns: repeat(5, 1fr); } }

  /* ===== Glass Card ===== */
  .card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12);
    transition: transform 0.25s ease, box-shadow 0.25s ease, background 30s linear, border-color 30s linear;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.18);
    background: var(--card-hover-bg, rgba(255,255,255,0.14));
  }
  .card:active {
    transform: scale(0.98);
    transition: transform 0.1s ease;
  }

  /* Card Icon */
  .card-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    flex-shrink: 0;
    transition: transform 0.25s ease;
  }
  .card:hover .card-icon { transform: scale(1.1); }
  .card-icon img {
    width: 28px; height: 28px;
    object-fit: contain;
    border-radius: 4px;
  }

  /* Card Text */
  .card-text { min-width: 0; }
  .card-name {
    font-size: 0.95rem;
    font-weight: 600;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 30s linear;
  }
  .card-desc {
    font-size: 0.78rem;
    line-height: 1.3;
    opacity: 0.65;
    margin-top: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: color 30s linear;
  }

  /* ===== Footer ===== */
  footer {
    text-align: center;
    padding: 40px 0 32px;
    font-size: 0.8rem;
    opacity: 0.45;
    margin-top: auto;
    transition: color 30s linear;
  }

  /* ===== Debug time override ===== */
  .debug-bar {
    position: fixed;
    bottom: 12px;
    right: 12px;
    z-index: 100;
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .debug-bar:hover { opacity: 1; }
  .debug-bar button {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4);
    color: #fff;
    font-size: 0.7rem;
    cursor: pointer;
    backdrop-filter: blur(8px);
  }
  .debug-bar button:hover { background: rgba(255,255,255,0.15); }
</style>

// ============================================================
//  ⏰ 时间段 → 背景色映射
//     格式: { h: 小时(0-24), top: [R,G,B], bot: [R,G,B] }
//     每个关键帧定义顶部和底部的颜色，之间会平滑插值
// ============================================================
const TIME_COLORS = [
  { h: 0,  top: [6, 6, 40],       bot: [18, 18, 56]    }, // 00:00 深夜
  { h: 3,  top: [8, 8, 42],       bot: [20, 20, 60]    }, // 03:00 凌晨
  { h: 5,  top: [212, 135, 155],  bot: [240, 200, 212] }, // 05:00 粉红花丛 · 清晨
  { h: 7,  top: [107, 155, 107],  bot: [200, 228, 200] }, // 07:00 绿色原野 · 上午
  { h: 10, top: [91, 156, 196],   bot: [200, 228, 244] }, // 10:00 淡蓝海水 · 正午
  { h: 14, top: [212, 164, 76],   bot: [240, 220, 184] }, // 14:00 金黄沙滩 · 午后
  { h: 17, top: [212, 128, 144],  bot: [235, 195, 210] }, // 17:00 粉红花丛 · 黄昏
  { h: 19, top: [140, 120, 185],  bot: [42, 40, 90]    }, // 19:00 暮色褪去
  { h: 21, top: [10, 10, 48],     bot: [24, 24, 60]    }, // 21:00 夜空降临
  { h: 24, top: [6, 6, 40],       bot: [18, 18, 56]    }, // 24:00 回到深夜
];

// ============================================================
//  🎨 颜色插值工具
// ============================================================
function lerpColor(c1, c2, t) {
  return [
    Math.round(c1[0] + (c2[0] - c1[0]) * t),
    Math.round(c1[1] + (c2[1] - c1[1]) * t),
    Math.round(c1[2] + (c2[2] - c1[2]) * t),
  ];
}

function rgbStr([r, g, b]) { return `rgb(${r},${g},${b})`; }

// 获取当前时间对应的背景色
function getCurrentColors(now) {
  const hours = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;

  // 找到当前时间所在的两个关键帧
  let i = 0;
  for (; i < TIME_COLORS.length - 1; i++) {
    if (hours < TIME_COLORS[i + 1].h) break;
  }

  const a = TIME_COLORS[i];
  const b = TIME_COLORS[i + 1];
  const t = (hours - a.h) / (b.h - a.h);

  return {
    top: lerpColor(a.top, b.top, t),
    bot: lerpColor(a.bot, b.bot, t),
  };
}

// 判断当前是否属于"暗色时段"（夜晚 + 深夜）
function getNightFactor(now) {
  const h = now.getHours() + now.getMinutes() / 60;
  // 20:00-6:00 是夜晚，透明度渐变
  if (h >= 22)          return 1;                          // 22-24 全夜
  if (h >= 20)          return (h - 20) / 2;               // 20-22 渐入夜
  if (h <= 5)           return 1;                          // 0-5 全夜
  if (h <= 7)           return 1 - (h - 5) / 2;            // 5-7 天渐亮
  return 0;                                                  // 白天无星星
}

// ============================================================
//  ⭐ Canvas 星星
// ============================================================
const canvas = document.getElementById('star-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
let starTime = 0;

function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = [];
  const count = Math.floor((canvas.width * canvas.height) / 1800); // 密度
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * 0.85, // 偏上方分布
      r: Math.random() * 1.6 + 0.4,            // 半径 0.4-2.0
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleOffset: Math.random() * Math.PI * 2,
      baseAlpha: Math.random() * 0.5 + 0.5,    // 基础亮度
    });
  }
}

function drawStars(globalAlpha) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (globalAlpha <= 0) return;

  ctx.save();
  ctx.globalAlpha = globalAlpha;

  for (const s of stars) {
    const flicker = Math.sin(starTime * s.twinkleSpeed * 60 + s.twinkleOffset) * 0.3 + 0.7;
    const alpha = s.baseAlpha * flicker;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();

    // 亮星加辉光
    if (s.r > 1.2 && flicker > 0.9) {
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.15})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

// ============================================================
//  🌅 应用背景 & 全局颜色
// ============================================================
let debugHour = null; // 调试用：手动设置小时
let currentNightFactor = 0;

function setDebugHour(h) {
  debugHour = h;
  updateBackground();
}

function getSimulatedNow() {
  if (debugHour !== null) {
    const d = new Date();
    d.setHours(Math.floor(debugHour), (debugHour % 1) * 60, 0, 0);
    return d;
  }
  return new Date();
}

function updateBackground() {
  const now = getSimulatedNow();
  const colors = getCurrentColors(now);
  const nf = getNightFactor(now);
  currentNightFactor = nf;

  // 背景渐变
  const gradient = `linear-gradient(180deg, ${rgbStr(colors.top)} 0%, ${rgbStr(colors.bot)} 100%)`;
  document.body.style.background = gradient;

  // 计算平均亮度决定文字颜色
  const avgLum = (colors.top[0] + colors.top[1] + colors.top[2]) / 3 / 255;

  // 文字颜色
  const textColor = avgLum > 0.45 ? 'rgba(30,30,50,0.9)' : 'rgba(255,255,255,0.9)';
  const textMuted = avgLum > 0.45 ? 'rgba(30,30,50,0.55)' : 'rgba(255,255,255,0.55)';
  const cardBg = avgLum > 0.45
    ? 'rgba(255,255,255,0.55)'
    : 'rgba(255,255,255,0.08)';
  const cardBorder = avgLum > 0.45
    ? 'rgba(255,255,255,0.5)'
    : 'rgba(255,255,255,0.1)';
  const cardHoverBg = avgLum > 0.45
    ? 'rgba(255,255,255,0.75)'
    : 'rgba(255,255,255,0.14)';
  const dotColor = avgLum > 0.45 ? 'rgba(80,120,200,0.7)' : 'rgba(180,200,255,0.5)';

  // 应用文字颜色
  document.getElementById('page-title').style.color = textColor;
  document.getElementById('page-subtitle').style.color = textMuted;
  document.querySelector('footer').style.color = textMuted;
  document.querySelectorAll('.section-title').forEach(el => el.style.color = textColor);
  document.querySelectorAll('.section-title .dot').forEach(el => el.style.background = dotColor);
  document.querySelectorAll('.card').forEach(el => {
    el.style.background = cardBg;
    el.style.borderColor = cardBorder;
    el.style.color = textColor;
  });
  document.querySelectorAll('.card-name').forEach(el => el.style.color = textColor);
  document.querySelectorAll('.card-desc').forEach(el => el.style.color = textMuted);

  // 卡片 hover 背景（用 CSS 自定义属性）
  document.documentElement.style.setProperty('--card-hover-bg', cardHoverBg);

  // 星星
  drawStars(nf);
}

// ============================================================
//  🏗️ 渲染卡片
// ============================================================
function renderCards() {
  const main = document.getElementById('content');
  main.innerHTML = '';

  for (const section of SITES) {
    const sec = document.createElement('section');
    sec.innerHTML = `
      <div class="section-title">
        <span class="dot"></span>${section.category}
      </div>
      <div class="card-grid">
        ${section.links.map(link => `
          <a class="card" href="${link.url}" target="_blank" rel="noopener" title="${link.desc || ''}">
            <div class="card-icon">
              ${link.icon.startsWith('http') || link.icon.endsWith('.png') || link.icon.endsWith('.svg') || link.icon.endsWith('.ico')
                ? `<img src="${link.icon}" alt="">`
                : link.icon}
            </div>
            <div class="card-text">
              <div class="card-name">${link.name}</div>
              ${link.desc ? `<div class="card-desc">${link.desc}</div>` : ''}
            </div>
          </a>
        `).join('')}
      </div>
    `;
    main.appendChild(sec);
  }

  // 初始颜色
  updateBackground();
}

// ============================================================
//  🔁 动画循环 & 事件
// ============================================================
function animate(timestamp) {
  starTime = timestamp / 1000;
  drawStars(currentNightFactor);
  requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
  initStars();
  updateBackground();
});

// 每 30 秒刷新背景色
setInterval(updateBackground, 30000);

// 启动
renderCards();
initStars();
requestAnimationFrame(animate);
</script>
